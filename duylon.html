<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duylon World- trang web cho DUYLON Song cho</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="duylon-styles.css" />
</head>
<body>
  <div class="snow-background" aria-hidden="true"></div>
  <div class="page-wrapper">
    <header class="site-header">
      <h1>DUYLON WORLD</h1>
      <p>TRANG WEB CHO DUYLON SONG CHO, DUYLON LỬA CHÙA</p>
    </header>

    <nav class="navbar navbar-expand-lg main-nav">
      <div class="container-fluid px-0">
        <a class="navbar-brand" id="brandButton" href="#">
          <span class="brand-phulon" aria-label="DUYLON" data-brand-text="DUYLON">
            <span class="phulon-letter">D</span>
            <span class="phulon-letter">U</span>
            <span class="phulon-letter">Y</span>
            <span class="phulon-letter">L</span>
            <span class="phulon-letter">O</span>
            <span class="phulon-letter">N</span>
          </span>
          <span class="brand-world">WORLD</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#phulonNavbar"
          aria-controls="phulonNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="phulonNavbar">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link" href="#"><span class="nav-label">THƯ VIỆN</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="https://phulon-archive.vercel.app/" target="_blank" rel="noopener noreferrer"><span class="nav-label">SIUUU ARCHIVE</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link duylon-link" href="index.html"><span class="nav-label">PHULON SONG CHO</span></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="hero-section">
      <img class="hero-image" src="duylon.jpg" alt="Hình ảnh Duylon" />
      <div class="hero-content">
        <h2>CHÀO MỪNG ĐẾN VỚI THẾ GIỚI DUYLON</h2>
        <div class="hero-subtitle">
          <p>Trang web Siuuu cho DUYLON, kỷ nguyên trang web mới cho DUYLON, được thiết cho Lửa chùa và Fai fai</p>
        </div>
        <a class="hero-button" id="siuuuButton" href="#"><span>SIUUU</span></a>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    const heroImage = document.querySelector('.hero-image');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    let confettiTimer;

    function fireHeroConfetti() {
      if (!window.confetti || reduceMotion.matches) {
        return;
      }

      const rect = heroImage.getBoundingClientRect();
      const origin = {
        x: (rect.left + rect.width / 2) / window.innerWidth,
        y: (rect.top + rect.height / 2) / window.innerHeight
      };

      confetti({
        particleCount: 48,
        spread: 85,
        startVelocity: 34,
        scalar: 0.9,
        ticks: 95,
        origin,
        colors: ['#ffd84d', '#ff5c8a', '#38d9a9', '#4dabf7', '#ffffff']
      });
    }

    heroImage.addEventListener('mouseenter', () => {
      fireHeroConfetti();
      confettiTimer = window.setInterval(fireHeroConfetti, 650);
    });

    heroImage.addEventListener('mouseleave', () => {
      window.clearInterval(confettiTimer);
    });

    const siuuuButton = document.querySelector('#siuuuButton');
    const siuuuSoundSrc = 'SIUUUUUUUUUUUUUUUUUU!.mp3';

    siuuuButton.addEventListener('click', (event) => {
      event.preventDefault();
      const siuuuSound = new Audio(siuuuSoundSrc);
      siuuuSound.play();
    });

    const brandButton = document.querySelector('#brandButton');
    const brandPhulon = brandButton.querySelector('.brand-phulon');
    let brandDropTimer;
    let brandRestoreTimer;

    function setBrandLetters(text) {
      brandPhulon.setAttribute('aria-label', text);
      brandPhulon.innerHTML = '';

      text.split('').forEach((letter) => {
        const letterElement = document.createElement('span');
        letterElement.className = 'phulon-letter';
        letterElement.textContent = letter;
        brandPhulon.appendChild(letterElement);
      });
    }

    brandButton.addEventListener('click', (event) => {
      event.preventDefault();
      window.clearTimeout(brandDropTimer);
      window.clearTimeout(brandRestoreTimer);

      brandPhulon.classList.remove('brand-drop');
      brandPhulon.classList.remove('brand-siuuu');
      void brandPhulon.offsetWidth;
      brandPhulon.classList.add('brand-drop');

      brandDropTimer = window.setTimeout(() => {
        setBrandLetters('SIUUU');
        brandPhulon.classList.remove('brand-drop');
        brandPhulon.classList.add('brand-siuuu');

        brandRestoreTimer = window.setTimeout(() => {
          brandPhulon.classList.remove('brand-siuuu');
          setBrandLetters('DUYLON');
        }, 10000);
      }, 520);
    });

    document.querySelectorAll('.main-nav .dropdown').forEach((dropdown) => {
      const toggle = dropdown.querySelector('[data-bs-toggle="dropdown"]');
      const menu = dropdown.querySelector('.dropdown-menu');
      let allowClose = false;

      toggle.addEventListener('hide.bs.dropdown', (event) => {
        if (allowClose || !menu.classList.contains('show')) {
          allowClose = false;
          menu.classList.remove('dropdown-closing');
          return;
        }

        event.preventDefault();
        menu.classList.add('dropdown-closing');

        window.setTimeout(() => {
          allowClose = true;
          bootstrap.Dropdown.getOrCreateInstance(toggle).hide();
        }, 360);
      });
    });

    const snowBackground = document.querySelector('.snow-background');
    const snowImages = [
      'duylon.jpg',
      'duylon2.jpg',
      'duylon3.jpg'
    ];

    if (snowBackground && !reduceMotion.matches) {
      for (let index = 0; index < 36; index += 1) {
        const flake = document.createElement('img');
        const size = 34 + Math.random() * 34;

        flake.className = 'snow-photo';
        flake.src = snowImages[index % snowImages.length];
        flake.alt = '';
        flake.style.setProperty('--flake-size', `${size}px`);
        flake.style.setProperty('--flake-left', `${Math.random() * 100}%`);
        flake.style.setProperty('--flake-delay', `${Math.random() * -18}s`);
        flake.style.setProperty('--flake-duration', `${10 + Math.random() * 12}s`);
        flake.style.setProperty('--flake-drift', `${-60 + Math.random() * 120}px`);
        flake.style.setProperty('--flake-spin', `${-180 + Math.random() * 360}deg`);
        flake.style.opacity = (0.38 + Math.random() * 0.28).toFixed(2);

        snowBackground.appendChild(flake);
      }
    }
  </script>
</body>
</html>
